<svg width="500" height="170" viewBox="0 0 500 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="roundcard">
      <rect width="500" height="170" rx="14"/>
    </clipPath>
  </defs>

  <!-- Card bg -->
  <rect width="500" height="170" rx="14" fill="#ffffff"/>
  <rect width="500" height="170" rx="14" fill="none" stroke="#E4E4E7" stroke-width="1"/>

  <!-- Left pink panel -->
  <rect x="0" y="0" width="150" height="170" fill="#FDF2F8" clip-path="url(#roundcard)"/>

  <!-- Vertical separator -->
  <line x1="150" y1="0" x2="150" y2="170" stroke="#EDE9F0" stroke-width="1"/>

  <!-- Avatar -->
  <circle cx="75" cy="68" r="30" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1.2"/>
  <text x="75" y="74"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="16" font-weight="700"
    fill="#9D174D">HA</text>

  <!-- Full name — single line centered -->
  <text x="75" y="114"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11.5" font-weight="700"
    fill="#18181B" letter-spacing="0.1">Harshil Anuwadia</text>

  <!-- Handle -->
  <text x="75" y="131"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9.5"
    fill="#A1A1AA" letter-spacing="0.2">@Harshil-Anuwadia</text>

  <!-- RIGHT SIDE -->

  <!-- Label -->
  <text x="172" y="32"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9" font-weight="600"
    fill="#A1A1AA" letter-spacing="2">GITHUB SPONSORS</text>

  <!-- Headline -->
  <text x="172" y="58"
    font-family="Georgia, serif"
    font-size="20" font-weight="700"
    fill="#09090B" letter-spacing="-0.4">Support my work</text>

  <!-- Bio line 1 -->
  <text x="172" y="79"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11.5"
    fill="#71717A" letter-spacing="0.1">Open source developer building tools</text>

  <!-- Bio line 2 -->
  <text x="172" y="96"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11.5"
    fill="#71717A" letter-spacing="0.1">that developers actually love.</text>

  <!-- Thin separator -->
  <line x1="172" y1="112" x2="482" y2="112" stroke="#E4E4E7" stroke-width="0.75"/>

  <!-- Stats row -->
  <!-- From label + value -->
  <text x="172" y="133"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" fill="#A1A1AA">From</text>

  <text x="198" y="133"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" font-weight="700"
    fill="#09090B">$1 / mo</text>

  <!-- Dot separator -->
  <circle cx="243" cy="129" r="1.8" fill="#D4D4D8"/>

  <!-- Sponsors count -->
  <text x="252" y="133"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" fill="#A1A1AA">0 sponsors</text>

  <!-- Dot separator -->
  <circle cx="304" cy="129" r="1.8" fill="#D4D4D8"/>

  <!-- Open source -->
  <text x="313" y="133"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" fill="#A1A1AA">100% open source</text>

  <!-- Sponsor button -->
  <rect x="356" y="143" width="126" height="18" rx="0" fill="none"/>
  <rect x="356" y="140" width="126" height="22" rx="7" fill="#18181B"/>

  <!-- Heart symbol -->
  <text x="369" y="155"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" fill="#F9A8D4">♥</text>

  <!-- Button text -->
  <text x="419" y="155"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11" font-weight="600"
    fill="#FFFFFF" letter-spacing="0.3">Sponsor me</text>
</svg>
